name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. Regenerate Clean Android project with package com.kainuwa.bot
      - name: Regenerate Android Architecture
        run: |
          rm -rf android/
          flutter create --org com.kainuwa --project-name bot .

      # 2. Generate Deterministic Signing Keystore
      - name: Generate Release Keystore
        run: |
          keytool -genkey -v -keystore android/app/keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias kainuwa_key -storepass kainuwa123 -keypass kainuwa123 \
            -dname "CN=Kainuwa, OU=Dev, O=Kainuwa Digital, L=Abuja, S=FCT, C=NG"

      # 3. Inject Build Gradle Config (Package com.kainuwa.bot & Signing Key)
      - name: Configure Gradle Signing & Application ID
        run: |
          cat << 'gradle_EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "com.kainuwa.bot"
              compileSdk 34

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              defaultConfig {
                  applicationId "com.kainuwa.bot"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }

              signingConfigs {
                  release {
                      storeFile file("keystore.jks")
                      storePassword "kainuwa123"
                      keyAlias "kainuwa_key"
                      keyPassword "kainuwa123"
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source "../.."
          }
          gradle_EOF

      # 4. Set Display Name (Kainuwa Bot) & Internet Permissions
      - name: Configure Manifest
        run: |
          sed -i 's/android:label=".*"/android:label="Kainuwa Bot"/' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>' android/app/src/main/AndroidManifest.xml

      # 5. Generate Launcher Icons
      - name: Generate App Launcher Icons
        run: |
          flutter pub get
          dart run flutter_launcher_icons

      # 6. Compile Release APK
      - name: Compile Signed Release APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
