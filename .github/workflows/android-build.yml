name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Explicitly grant the Action permission to push the keystore back to your repo
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate and Save Permanent Keystore (If Missing)
        run: |
          if [ ! -f "kainuwa_keystore.jks" ]; then
            echo "Keystore missing. Generating and committing to repository..."
            keytool -genkey -v -keystore kainuwa_keystore.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias kainuwa_key -storepass kainuwa123 -keypass kainuwa123 \
              -dname "CN=Kainuwa, OU=Dev, O=Kainuwa Digital, L=Abuja, S=FCT, C=NG"
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add kainuwa_keystore.jks
            git commit -m "chore: auto-generate permanent Android release keystore"
            git push
          else
            echo "Permanent keystore found. Reusing it for signature consistency."
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Regenerate Android Architecture
        run: |
          rm -rf android/
          flutter create --org com.kainuwa --project-name bot .
          rm -f android/app/build.gradle.kts

      - name: Apply Permanent Keystore
        run: |
          # Copy the permanent keystore into the newly created android/app directory
          cp kainuwa_keystore.jks android/app/keystore.jks

      - name: Configure Gradle Signing & Application ID
        run: |
          cat << 'gradle_EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "com.kainuwa.bot"
              compileSdk 36

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              defaultConfig {
                  applicationId "com.kainuwa.bot"
                  minSdk 21
                  targetSdk 36
                  versionCode 1
                  versionName "1.0.0"
              }

              signingConfigs {
                  release {
                      storeFile file("keystore.jks")
                      storePassword "kainuwa123"
                      keyAlias "kainuwa_key"
                      keyPassword "kainuwa123"
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source "../.."
          }
          gradle_EOF

      - name: Configure Manifest
        run: |
          sed -i 's/android:label=".*"/android:label="Kainuwa Bot"/' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>' android/app/src/main/AndroidManifest.xml

      - name: Generate App Launcher Icons
        run: |
          flutter pub get
          dart run flutter_launcher_icons

      - name: Compile Signed Release APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
